kind = "web"
previewPath = "/"
title = "AutoNegotiating.com"
version = "1.0.0"
id = "artifacts/autonegotiating"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21910

[services.development]
run = "pnpm --filter @workspace/autonegotiating run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autonegotiating", "run", "build" ]
publicDir = "artifacts/autonegotiating/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21910"
BASE_PATH = "/"

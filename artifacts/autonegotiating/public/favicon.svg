<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: brand charcoal with rounded corners -->
  <rect width="180" height="180" rx="36" fill="#1E1E1C"/>

  <!-- Steering wheel outer ring -->
  <circle cx="90" cy="90" r="58" fill="none" stroke="#C95E1A" stroke-width="13"/>

  <!-- Three spokes: top, bottom-left, bottom-right -->
  <!-- Top spoke: 90° (straight up) -->
  <line x1="90" y1="90" x2="90" y2="32" stroke="#C95E1A" stroke-width="11" stroke-linecap="round"/>
  <!-- Bottom-right spoke: 30° below horizontal = 210° from top -->
  <!-- end: (90 + 58*sin(120°), 90 + 58*cos(120°)) = (90+50.2, 90+29) = (140.2, 119) -->
  <line x1="90" y1="90" x2="140" y2="119" stroke="#C95E1A" stroke-width="11" stroke-linecap="round"/>
  <!-- Bottom-left spoke: 240° from top -->
  <!-- end: (90 - 58*sin(120°), 90 + 58*cos(120°)) = (90-50.2, 119) = (39.8, 119) -->
  <line x1="90" y1="90" x2="40" y2="119" stroke="#C95E1A" stroke-width="11" stroke-linecap="round"/>

  <!-- Hub cap (filled circle center) -->
  <circle cx="90" cy="90" r="16" fill="#C95E1A"/>

  <!-- Subtle inner ring detail -->
  <circle cx="90" cy="90" r="42" fill="none" stroke="#C95E1A" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
